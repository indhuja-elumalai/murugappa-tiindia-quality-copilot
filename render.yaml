services:
  - type: web
    name: tii-quality-api
    runtime: node
    plan: free
    rootDir: services/api
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.18.0
      - key: NODE_ENV
        value: production
      - key: MONGODB_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: AI_INTERNAL_API_KEY
        sync: false

  - type: web
    name: tii-quality-ai
    runtime: python
    plan: free
    rootDir: services/ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: AI_CORS_ORIGIN
        sync: false
      - key: AI_INTERNAL_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
